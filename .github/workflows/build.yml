name: Build gem
on:
  release:
    types:
      - released
env:
  RACK_ENV: test
  GEM_HOST: https://rubygems.pkg.github.com/geniebelt
jobs:
  release:
    name: Run test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SIMPLECOV: json
      BUNDLE_GEMFILE: gemfiles/rails_8_1.gemfile
    container:
      image: ruby:3.4-alpine
    steps:
      - name: Install dependencies
        run: |
          apk add --no-cache --update build-base \
              linux-headers \
              bash openssh-client git tar libcurl rsync \
              postgresql-dev \
              nodejs \
              tzdata libcurl curl-dev libxml2 libxml2-dev yaml-dev gcc make \
              sqlite sqlite-dev sqlite-libs \
              imagemagick ghostscript \
              ffmpeg x264 x265 libvpx libtheora \
              file
          git config --global --add safe.directory '*'
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Cache gems
        uses: actions/cache@v5
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-build-${{ hashFiles('gemfiles/rails_8_1.gemfile') }}-${{ hashFiles('gemfiles/rails_8_1.gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-build-
      - name: Install gems
        shell: bash
        run: |
          bundle config path vendor/bundle
          bundle config build.ovirt-engine-sdk "--with-cflags='-Wno-error=incompatible-pointer-types -Wno-error=implicit-function-declaration'"
          bundle config set with 'development test'
          bundle install --jobs 16 --retry 3
      - name: Runs tests
        shell: bash
        run: |
          bundle exec rspec -f j -o rspec_results.json -f p
      - name: Build gem
        shell: bash
        run: |
          git ls-files lib
          git ls-files -- bin/*
          gem build ./gb-paperclip.gemspec
          ls -lah
      - name: Release
        shell: bash
        run: |
          mkdir -p ~/.gem/
          echo ":github: Bearer ${{ secrets.GITHUB_TOKEN }}" > ~/.gem/credentials
          chmod 0600 ~/.gem/credentials
          for GEM in ./*.gem; do
            gem push "$GEM" --host "$GEM_HOST" --key github
          done
